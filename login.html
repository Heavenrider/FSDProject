<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Login | ScholarGate</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display:flex; align-items:center; justify-content:center; height:100vh; background:#f1f5f9">
    <div class="card" style="width:350px">
        <h2 style="text-align:center">Welcome Back</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email (use admin@test.com for Admin)" required>
            <input type="password" placeholder="Password" required>
            <button type="submit" class="btn" style="width:100%; margin-top:10px">Login</button>
        </form>
    </div>
    <script>
        document.getElementById('loginForm').onsubmit = (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            localStorage.setItem('userEmail', email);
            localStorage.setItem('userRole', email === 'admin@test.com' ? 'admin' : 'student');
            location.href = email === 'admin@test.com' ? 'admin.html' : 'index.html';
        };
    </script>
</body>
</html>
